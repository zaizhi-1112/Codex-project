<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Codex 工具项目总览</title>
  <style>
    :root {
      --bg: #f8fafc;
      --panel: #ffffff;
      --text: #0f172a;
      --muted: #64748b;
      --line: #e2e8f0;
      --primary: #0f766e;
      --primary-soft: #ccfbf1;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 85% 10%, #dbeafe 0%, transparent 30%),
        radial-gradient(circle at 15% 95%, #ccfbf1 0%, transparent 35%),
        var(--bg);
      min-height: 100vh;
    }
    .container {
      max-width: 1080px;
      margin: 0 auto;
      padding: 38px 20px 56px;
    }
    h1 {
      margin: 0;
      font-size: clamp(1.8rem, 3vw, 2.5rem);
      letter-spacing: .2px;
    }
    .sub {
      margin: 10px 0 28px;
      color: var(--muted);
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
    }
    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 16px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
    }
    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 999px;
      font-size: 12px;
      color: var(--primary);
      background: var(--primary-soft);
      margin-bottom: 10px;
    }
    .title {
      margin: 0;
      font-size: 18px;
    }
    .desc {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
      min-height: 44px;
      margin: 10px 0 12px;
    }
    .tech {
      font-size: 13px;
      color: #334155;
      margin: 0 0 14px;
    }
    .links {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    a {
      display: inline-block;
      text-decoration: none;
      color: #0f172a;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 7px 10px;
      font-size: 13px;
      background: #fff;
    }
    a:hover { border-color: #94a3b8; }
    .error {
      color: #b91c1c;
      margin-top: 16px;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <main class="container">
    <h1>Codex 工具项目总览</h1>
    <p class="sub">每个项目都位于独立目录，互不影响；可按需进入项目目录自取使用。</p>
    <section id="grid" class="grid"></section>
    <p id="error" class="error" hidden></p>
  </main>

  <script>
    async function loadProjects() {
      const resp = await fetch('./projects/projects.json', { cache: 'no-store' });
      if (!resp.ok) throw new Error('读取项目清单失败');
      return resp.json();
    }

    function renderCard(project) {
      return `
        <article class="card">
          <span class="badge">${project.status || 'stable'}</span>
          <h2 class="title">${project.name}</h2>
          <p class="desc">${project.summary || ''}</p>
          <p class="tech">技术栈：${project.stack || '未填写'}</p>
          <div class="links">
            <a href="${project.readme}" target="_blank" rel="noreferrer">项目介绍</a>
            <a href="${project.entry}" target="_blank" rel="noreferrer">打开工具</a>
            <a href="${project.path}" target="_blank" rel="noreferrer">项目目录</a>
          </div>
        </article>
      `;
    }

    (async function init() {
      const grid = document.getElementById('grid');
      const error = document.getElementById('error');
      try {
        const projects = await loadProjects();
        if (!Array.isArray(projects) || projects.length === 0) {
          error.hidden = false;
          error.textContent = '目前还没有登记项目。';
          return;
        }
        grid.innerHTML = projects.map(renderCard).join('');
      } catch (err) {
        error.hidden = false;
        error.textContent = `加载失败：${err.message}。请使用本地静态服务器访问。`;
      }
    })();
  </script>
</body>
</html>
